<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tìm Sân Thể Thao - SanTime</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/courts.css">
</head>
<body>
  <!-- Navbar will be injected here by app.js -->
  <div id="navbar-container"></div>

  <main class="courts-page">
    <!-- Page Header -->
    <header class="page-header section text-center">
      <div class="container fade-in-up">
        <h1 class="mb-sm">Tìm sân thể thao</h1>
        <p class="text-xl text-secondary mb-lg">Khám phá hơn 500 sân thể thao chất lượng tại Hà Nội</p>
        
        <div class="search-container max-w-2xl mx-auto">
          <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="form-input search-input" placeholder="Tìm kiếm sân theo tên, khu vực...">
          </div>
        </div>
      </div>
    </header>

    <div class="container section pt-0">
      <div class="layout-grid">
        <!-- Sidebar Filters -->
        <aside class="sidebar fade-in-left">
          <div class="filter-panel card-glass">
            <div class="flex justify-between items-center mb-md">
              <h3 class="text-lg">Bộ lọc</h3>
              <button id="resetFilters" class="text-sm text-primary hover:underline">Xóa lọc</button>
            </div>
            
            <!-- Sport Type Filter -->
            <div class="filter-group mb-lg">
              <h4 class="form-label">Môn thể thao</h4>
              <div class="sport-filters" id="sportFilters">
                <button class="sport-btn active" data-sport="all">Tất cả</button>
                <button class="sport-btn" data-sport="football">⚽ Bóng đá</button>
                <button class="sport-btn" data-sport="badminton">🏸 Cầu lông</button>
                <button class="sport-btn" data-sport="volleyball">🏐 Bóng chuyền</button>
                <button class="sport-btn" data-sport="basketball">🏀 Bóng rổ</button>
                <button class="sport-btn" data-sport="tennis">🎾 Tennis</button>
              </div>
            </div>

            <!-- District Filter -->
            <div class="filter-group mb-lg">
              <h4 class="form-label">Khu vực (Quận)</h4>
              <select id="districtFilter" class="form-select">
                <option value="all">Tất cả khu vực</option>
                <!-- Generated by JS -->
              </select>
            </div>

            <!-- Price Filter -->
            <div class="filter-group mb-lg">
              <h4 class="form-label">Mức giá</h4>
              <div class="radio-group" id="priceFilter">
                <label class="radio-label">
                  <input type="radio" name="price" value="all" checked>
                  <span class="radio-custom"></span> Tất cả mức giá
                </label>
                <label class="radio-label">
                  <input type="radio" name="price" value="under200">
                  <span class="radio-custom"></span> Dưới 200.000đ
                </label>
                <label class="radio-label">
                  <input type="radio" name="price" value="200to400">
                  <span class="radio-custom"></span> 200.000đ - 400.000đ
                </label>
                <label class="radio-label">
                  <input type="radio" name="price" value="over400">
                  <span class="radio-custom"></span> Trên 400.000đ
                </label>
              </div>
            </div>

            <!-- Rating Filter -->
            <div class="filter-group mb-lg">
              <h4 class="form-label">Đánh giá</h4>
              <div class="rating-filters" id="ratingFilter">
                <button class="btn btn-outline btn-sm active" data-rating="0">Tất cả</button>
                <button class="btn btn-outline btn-sm" data-rating="4">4.0+ ⭐</button>
                <button class="btn btn-outline btn-sm" data-rating="4.5">4.5+ ⭐</button>
              </div>
            </div>

            <!-- Status Filter -->
            <div class="filter-group">
              <label class="toggle-label flex items-center justify-between">
                <span class="form-label mb-0">Chỉ hiện sân trống</span>
                <input type="checkbox" id="statusFilter" class="toggle-input">
                <span class="toggle-slider"></span>
              </label>
            </div>
            
          </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
          <div class="flex justify-between items-center mb-md fade-in">
            <div class="result-count" id="resultCount">Đang tải...</div>
            <div class="sort-by hidden">
              <select class="form-select text-sm" style="padding: 8px 30px 8px 12px;">
                <option>Sắp xếp: Phù hợp nhất</option>
                <option>Giá: Thấp đến Cao</option>
                <option>Giá: Cao đến Thấp</option>
                <option>Đánh giá cao nhất</option>
              </select>
            </div>
          </div>

          <!-- Courts Grid -->
          <div class="courts-grid" id="courtsGrid">
            <!-- Court cards will be injected here by courts.js -->
          </div>
          
          <div id="noResults" class="hidden text-center py-4xl">
            <div class="text-6xl mb-md">🏜️</div>
            <h3 class="text-xl mb-sm">Không tìm thấy sân nào</h3>
            <p class="text-secondary">Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm</p>
            <button class="btn btn-primary mt-md" onclick="document.getElementById('resetFilters').click()">Xóa bộ lọc</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer will be injected here by app.js -->
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/courts.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('navbar-container').innerHTML = getNavbarHTML('../');
        document.getElementById('footer-container').innerHTML = getFooterHTML('../');
        initNavbar();
        initMobileMenu();
    });
  </script>
</body>
</html>
