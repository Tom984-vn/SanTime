<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Check Gemini Models</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #0A0E17; color: #fff; }
        input { padding: 10px; width: 300px; margin-right: 10px; border-radius: 4px; border: 1px solid #333; }
        button { padding: 10px 20px; cursor: pointer; background: #00E676; border: none; border-radius: 4px; font-weight: bold; }
        pre { background: #1a1f2e; padding: 15px; border-radius: 8px; overflow: auto; white-space: pre-wrap; margin-top: 20px;}
        .model-item { margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 4px;}
        .model-name { color: #00B0FF; font-weight: bold; font-size: 18px; }
        .model-desc { color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>
    <h2>Kiểm tra các Model khả dụng của Google AI Studio</h2>
    <p>Nhập API Key của bạn vào dưới đây để lấy danh sách các mô hình mà tài khoản của bạn được phép truy cập.</p>
    
    <div>
        <input type="text" id="apiKey" placeholder="Nhập Gemini API Key...">
        <button onclick="fetchModels()">Kiểm tra Models</button>
    </div>

    <div id="results"></div>

    <script>
        async function fetchModels() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!apiKey) {
                alert('Vui lòng nhập API Key!');
                return;
            }

            resultsDiv.innerHTML = '<p>Đang tải dữ liệu từ Google...</p>';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                
                if (!response.ok) {
                    const error = await response.json();
                    resultsDiv.innerHTML = `<pre style="color: #ff5252">Lỗi API (${response.status}): ${JSON.stringify(error, null, 2)}</pre>`;
                    return;
                }

                const data = await response.json();
                
                let html = `<h3>Tìm thấy ${data.models.length} Models:</h3>`;
                data.models.forEach(model => {
                    html += `
                        <div class="model-item">
                            <div class="model-name">${model.name.replace('models/', '')}</div>
                            <div class="model-desc">${model.description}</div>
                            <div class="model-desc" style="font-size: 12px; color: #00E676;">Phiên bản: ${model.version}</div>
                        </div>
                    `;
                });
                
                resultsDiv.innerHTML = html;
                
            } catch (err) {
                resultsDiv.innerHTML = `<pre style="color: #ff5252">Lỗi kết nối: ${err.message}</pre>`;
            }
        }
    </script>
</body>
</html>
